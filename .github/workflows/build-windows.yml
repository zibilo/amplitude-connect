name: Build Windows Installer (Win10/11)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows-build:
    name: Build MUCO-AMPLITUDE.exe (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # On utilise npm install pour s'assurer que les nouveaux devDependencies 
        # (electron et electron-builder) sont bien installés
        run: npm install

      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Cette commande lance 'vite build' PUIS 'electron-builder'
        # On ajoute --publish never pour éviter les erreurs d'authentification GitHub
        run: npm run electron:build -- --publish never

      - name: List artifacts (Debug)
        shell: bash
        run: ls -la dist/ || ls -la release/

      - name: Upload Setup .exe
        uses: actions/upload-artifact@v4
        with:
          name: MUCO-AMPLITUDE-Windows-Setup
          path: |
            dist/*Setup*.exe
            dist/*.exe.blockmap
            dist/latest.yml
            release/*Setup*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 90

      - name: Upload Portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: MUCO-AMPLITUDE-Windows-Portable
          path: |
            dist/*Portable*.exe
            release/*Portable*.exe
          retention-days: 90

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            release/*Setup*.exe
            release/*Portable*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
